name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Build Debug APK
      run: gradle assembleDebug --no-daemon

    - name: Rename APK
      run: mv app/build/outputs/apk/debug/app-debug.apk ZaymNaKartu-RuStore-Ready.apk

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: ZaymNaKartu-RuStore-Ready
        path: ZaymNaKartu-RuStore-Ready.apk
