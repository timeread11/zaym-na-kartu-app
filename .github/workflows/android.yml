name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Fix Icon Format
      run: |
        sudo apt-get update
        sudo apt-get install -y imagemagick
        for dir in app/src/main/res/mipmap-*; do
          if [ -f "$dir/ic_launcher.png" ]; then
            mogrify -format png "$dir/ic_launcher.png"
          fi
        done

    - name: Build Debug APK
      run: gradle assembleDebug --no-daemon

    - name: Rename APK
      run: mv app/build/outputs/apk/debug/app-debug.apk ZaymNaKartu-RuStore-Ready.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ZaymNaKartu-RuStore-Ready
        path: ZaymNaKartu-RuStore-Ready.apk
